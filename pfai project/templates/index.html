<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Physiotherapist Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2><i class="fas fa-user-md"></i> AI Physio Assistant</h2>
            <button id="voice-toggle-btn" title="Toggle Voice Output">
                <i class="fas fa-volume-up"></i>
            </button>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="message system-msg">
                Hello! I am your AI Physiotherapist Assistant. Please describe the symptoms or discomfort you are currently experiencing.
            </div>
        </div>

        <div class="chat-input-area">
            <button id="mic-btn" class="icon-btn" title="Speak into Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <input type="text" id="user-input" placeholder="Describe your symptoms..." autocomplete="off">
            <button id="send-btn" class="icon-btn" title="Send Message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
